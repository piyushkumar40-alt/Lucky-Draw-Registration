<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mak Power Lucky Draw</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
 
<style>
:root {
  --primary: #EE1C25;
  --bg: #f8fafc;
  --text: #1e293b;
  --light: #94a3b8;
  --card: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  min-height: 100vh;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #ffffff 0%, #fff3f4 100%);
  padding: 50px 20px;
  text-align: center;
}

.brand-logo {
  max-width: 140px;
  margin-bottom: 18px;
}

.hero h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
}

.hero p {
  font-size: 14px;
  color: var(--light);
  margin-top: 6px;
}

/* CARD */
.container {
  padding: 20px;
  display: flex;
  justify-content: center;
}

.card {
  background: var(--card);
  width: 100%;
  max-width: 420px;
  padding: 28px;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,.05);
  margin-top: -40px;
  position: relative;
  z-index: 10;
}

/* INPUTS */
.input-group {
  position: relative;
  margin-bottom: 22px;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 18px 14px 8px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  font-size: 14px;
  background: #fff;
  transition: .2s;
}

.input-group label {
  position: absolute;
  left: 14px;
  top: 16px;
  font-size: 14px;
  color: var(--light);
  pointer-events: none;
  transition: .2s ease all;
  background: #fff;
  padding: 0 4px;
}

.input-group input:focus ~ label,
.input-group input:not(:placeholder-shown) ~ label,
.custom-select-wrapper.open ~ label,
.custom-select-wrapper.has-value ~ label,
.input-group select:focus ~ label,
.input-group select:valid ~ label {
  top: -8px;
  font-size: 11px;
  color: var(--primary);
}

/* CUSTOM SELECT STYLES */
.input-group select.hidden-select {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

.custom-select-wrapper {
  position: relative;
  width: 100%;
}

.custom-select-trigger {
  width: 100%;
  padding: 18px 14px 8px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  font-size: 14px;
  background: #fff;
  transition: .2s;
  cursor: pointer;
  display: block;
  text-align: left;
  position: relative;
  min-height: 48px;
  color: var(--text);
  box-sizing: border-box;
}

.custom-select-trigger::after {
  content: "";
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent;
  border-top-color: var(--light);
  pointer-events: none;
  transition: transform 0.2s ease, border-top-color 0.2s ease;
}

.custom-select-wrapper.open .custom-select-trigger::after {
  transform: translateY(-75%) rotate(180deg);
  border-top-color: var(--primary);
}

.custom-select-wrapper.open .custom-select-trigger {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(238,28,37,.1);
}

.custom-options {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  z-index: 999;
  max-height: 200px;
  overflow-y: auto;
  display: none;
  box-sizing: border-box;
}

.custom-select-wrapper.open .custom-options {
  display: block;
}

.custom-option {
  padding: 12px 14px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  color: var(--text);
  transition: background 0.15s, color 0.15s;
}

.custom-option:hover {
  background-color: #fff3f4;
  color: var(--primary);
}

.custom-option.selected {
  background-color: var(--primary);
  color: #fff;
}

/* Custom scrollbar for options list */
.custom-options::-webkit-scrollbar {
  width: 6px;
}
.custom-options::-webkit-scrollbar-track {
  background: #f8fafc;
  border-radius: 0 12px 12px 0;
}
.custom-options::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 6px;
}
.custom-options::-webkit-scrollbar-thumb:hover {
  background: var(--light);
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(238,28,37,.1);
}

/* BUTTONS */
button, .btn-link {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
  text-align: center;
  display: block;
  text-decoration: none;
}

.primary-btn {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 10px 25px rgba(238,28,37,.2);
}

.insta-btn {
  background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  color: #fff;
}

/* MSG & SECTIONS */
.msg {
  font-size: 13px;
  margin: 15px 0;
  display: block;
  min-height: 20px;
}

#formSection, #followSection {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px dashed #e2e8f0;
}

.hidden { display: none !important; }
.success { color: #16a34a; }
.error { color: #dc2626; }

#countdown {
  font-size: 48px;
  font-weight: 700;
  color: var(--primary);
  margin: 10px 0;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.loader {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.footer { text-align: center; font-size: 12px; color: var(--light); padding: 20px; }
</style>
</head>

<body>

<div class="overlay" id="overlay"><div class="loader"></div></div>

<div class="hero" id="heroArea">
  <img src="Mak_Logo 1212.jpg" class="brand-logo">
  <h1>Mak Power Lucky Draw</h1>
  <p>Enter your coupon code & win exciting rewards</p>
</div>

<div class="container">
  <div class="card">
    
    <div id="couponArea">
      <div class="input-group">
        <input type="text" id="couponCode" placeholder=" ">
        <label>Coupon Code</label>
      </div>
      <button class="primary-btn" onclick="checkCoupon()">Verify Coupon</button>
    </div>

    <div id="mainMsg" class="msg"></div>

    <div id="formSection" class="hidden">
      <div class="input-group">
        <select id="event" required>
          <option value="" disabled selected hidden></option>
          <option value="10th July Chandigarh Business Meet 2026">10th July Chandigarh Business Meet 2026</option>
          <option value="11th July Pathankot Business Meet 2026">11th July Pathankot Business Meet 2026</option>
          <option value="13th July Bareilly Business Meet 2026">13th July Bareilly Business Meet 2026</option>
          <option value="15th July Ranchi Business Meet 2026">15th July Ranchi Business Meet 2026</option>
          <option value="17th July Saharsa Business Meet 2026">17th July Saharsa Business Meet 2026</option>
          <option value="18th July Bhagalpur Business Meet 2026">18th July Bhagalpur Business Meet 2026</option>
          <option value="19th July Gaya Business Meet 2026">19th July Gaya Business Meet 2026</option>
          <option value="20th July Patna Business Meet 2026">20th July Patna Business Meet 2026</option>
        </select>
        <label>Event 2026</label>
      </div>
      <div class="input-group">
        <input type="text" id="fullName" placeholder=" ">
        <label>Full Name</label>
      </div>
      <div class="input-group">
        <input type="tel" id="mobile" placeholder=" ">
        <label>Whatsapp Mobile</label>
      </div>
      <div class="input-group">
        <input type="text" id="shop" placeholder=" ">
        <label>Shop Name</label>
      </div>
      <div class="input-group">
        <select id="role" required>
          <option value="" disabled selected hidden></option>
          <option value="SS">SS</option>
          <option value="Distributor">Distributor</option>
          <option value="Dealer">Dealer</option>
        </select>
        <label>Role</label>
      </div>
      
      <div class="input-group">
        <select id="state" required>
          <option value="" disabled selected hidden></option>
          <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
          <option value="Andhra Pradesh">Andhra Pradesh</option>
          <option value="Arunachal Pradesh">Arunachal Pradesh</option>
          <option value="Assam">Assam</option>
          <option value="Bihar">Bihar</option>
          <option value="Chandigarh">Chandigarh</option>
          <option value="Chhattisgarh">Chhattisgarh</option>
          <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
          <option value="Delhi">Delhi</option>
          <option value="Goa">Goa</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Haryana">Haryana</option>
          <option value="Himachal Pradesh">Himachal Pradesh</option>
          <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          <option value="Jharkhand">Jharkhand</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Kerala">Kerala</option>
          <option value="Ladakh">Ladakh</option>
          <option value="Lakshadweep">Lakshadweep</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Manipur">Manipur</option>
          <option value="Meghalaya">Meghalaya</option>
          <option value="Mizoram">Mizoram</option>
          <option value="Nagaland">Nagaland</option>
          <option value="Odisha">Odisha</option>
          <option value="Puducherry">Puducherry</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Sikkim">Sikkim</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Telangana">Telangana</option>
          <option value="Tripura">Tripura</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Uttarakhand">Uttarakhand</option>
          <option value="West Bengal">West Bengal</option>
        </select>
        <label>State</label>
      </div>

      <div class="input-group">
        <input type="text" id="district" placeholder=" ">
        <label>District</label>
      </div>
      <button class="primary-btn" onclick="submitForm()">Submit Registration</button>
    </div>

    <div id="followSection" class="hidden" style="text-align:center;">
      <div style="font-size: 50px;">🎉</div>
      <h2>Success!</h2>
      <p style="color:var(--light); font-size:14px;">Opening Instagram in...</p>
      <div id="countdown">5</div>
      <a href="https://www.instagram.com/makpowerofficial/" target="_blank" class="btn-link insta-btn">Follow @makpowerofficial</a>
    </div>

  </div>
</div>

<div class="footer">© 2026 Mak Power</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbywwNqeEiCL9MFH_gCaBdOVPAuATkiXvMiDM3XPI72CD5YBVfHpZ1EoFvm9jdgfFAEEkw/exec";
const instaURL = "https://www.instagram.com/makpowerofficial/";

let couponVerified = false, userLat = "", userLong = "";

window.onload = function() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((pos) => {
      userLat = pos.coords.latitude; userLong = pos.coords.longitude;
    }, null, {timeout: 5000});
  }
  initCustomSelects();
};

function normalize(code) { return code.replace(/\D/g, ''); }
function showOverlay() { document.getElementById("overlay").style.display = "flex"; }
function hideOverlay() { document.getElementById("overlay").style.display = "none"; }

function showMsg(msg, type) {
  const el = document.getElementById("mainMsg");
  el.innerText = msg; el.className = "msg " + type;
}

function checkCoupon() {
  const code = normalize(document.getElementById("couponCode").value);
  if (code.length < 6) { showMsg("Enter valid coupon", "error"); return; }
  showOverlay();
  fetch(`${scriptURL}?q=${code}`).then(res => res.json()).then(data => {
    hideOverlay();
    if (data.valid) {
      couponVerified = true;
      showMsg("Verified! Enter details.", "success");
      document.getElementById("couponArea").classList.add("hidden");
      document.getElementById("formSection").classList.remove("hidden");
    } else { showMsg("Invalid or Used Coupon", "error"); }
  }).catch(() => { hideOverlay(); showMsg("Error connecting", "error"); });
}

function submitForm() {
  const event = document.getElementById("event").value;
  const name = document.getElementById("fullName").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const shop = document.getElementById("shop").value.trim();
  const role = document.getElementById("role").value;
  const state = document.getElementById("state").value;
  const district = document.getElementById("district").value.trim();
  const code = normalize(document.getElementById("couponCode").value);

  if (!event || !name || !mobile || !shop || !role || !state || !district) {
    showMsg("Fill all fields", "error"); return;
  }

  showOverlay();
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ event, name, couponCode: code, mobile, shop, role, state, district, lat: userLat, long: userLong })
  })
  .then(res => res.json()).then(data => {
    hideOverlay();
    if (data.status === "success") {
      document.getElementById("formSection").classList.add("hidden");
      document.getElementById("mainMsg").classList.add("hidden");
      document.getElementById("followSection").classList.remove("hidden");
      let t = 5;
      const interval = setInterval(() => { 
        t--; document.getElementById("countdown").innerText = t;
        if(t <= 0) {
            clearInterval(interval);
            window.location.href = instaURL;
        }
      }, 1000);
    } else { showMsg(data.message, "error"); }
  }).catch(() => { hideOverlay(); showMsg("Submission failed", "error"); });
}

function initCustomSelects() {
  const selects = document.querySelectorAll('select');
  selects.forEach(select => {
    if (select.classList.contains('hidden-select')) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'custom-select-wrapper';
    
    select.parentNode.insertBefore(wrapper, select.nextSibling);
    select.classList.add('hidden-select');

    const trigger = document.createElement('div');
    trigger.className = 'custom-select-trigger';
    trigger.innerHTML = select.options[select.selectedIndex]?.text || '&nbsp;';
    wrapper.appendChild(trigger);

    const optionsContainer = document.createElement('div');
    optionsContainer.className = 'custom-options';

    Array.from(select.options).forEach(opt => {
      if (opt.value === "" && (opt.disabled || opt.hidden)) return;
      
      const optDiv = document.createElement('div');
      optDiv.className = 'custom-option';
      optDiv.innerText = opt.text;
      optDiv.dataset.value = opt.value;
      if (opt.selected) optDiv.classList.add('selected');

      optDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        select.value = opt.value;
        select.dispatchEvent(new Event('change'));
        
        trigger.innerHTML = opt.text || '&nbsp;';
        
        optionsContainer.querySelectorAll('.custom-option').forEach(el => el.classList.remove('selected'));
        optDiv.classList.add('selected');
        
        wrapper.classList.remove('open');
        wrapper.classList.add('has-value');
      });

      optionsContainer.appendChild(optDiv);
    });

    wrapper.appendChild(optionsContainer);

    if (select.value) {
      wrapper.classList.add('has-value');
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.custom-select-wrapper').forEach(w => {
        if (w !== wrapper) w.classList.remove('open');
      });
      wrapper.classList.toggle('open');
    });
    
    select.addEventListener('change', () => {
      if (select.value) {
        wrapper.classList.add('has-value');
      } else {
        wrapper.classList.remove('has-value');
      }
    });
  });

  document.addEventListener('click', () => {
    document.querySelectorAll('.custom-select-wrapper').forEach(w => w.classList.remove('open'));
  });
}
</script>

</body>
</html>
